<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Home Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/553/553376.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --red: #ff3b30; --blue: #007aff; --bg: #f2f2f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; -webkit-tap-highlight-color: transparent; }
        
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn { padding: 15px; border-radius: 10px; border: none; font-weight: 600; width: 100%; margin: 5px 0; font-size: 16px; cursor: pointer; }
        .btn-secu { background: #8e8e93; color: white; }
        .btn-secu.active { background: var(--red); box-shadow: 0 0 15px rgba(255, 59, 48, 0.4); }
        
        /* ÉCRAN D'APPEL IPHONE */
        #callScreen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1c1c1e; color: white; z-index: 10000;
            flex-direction: column; align-items: center; justify-content: space-around;
        }
        .caller-id { text-align: center; margin-top: 50px; }
        .caller-id h2 { font-size: 32px; margin: 10px 0; }
        .caller-id p { color: #8e8e93; font-size: 18px; }
        
        .accept-btn {
            width: 80px; height: 80px; background: #34c759; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(52, 199, 89, 0.4); border: none; cursor: pointer;
        }
        .decline-btn {
            width: 80px; height: 80px; background: var(--red); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.4); border: none; cursor: pointer;
        }
        .pulse { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h2 style="margin-top:40px;">🏠 Dashboard IUT</h2>
    <div class="card">
        <button id="btnSecu" class="btn btn-secu" onclick="toggleSecurity()">ACTIVER LA SURVEILLANCE</button>
        <p id="statusMsg" style="font-size: 12px; color: #8e8e93;">Touchez un bouton pour activer l'audio</p>
    </div>

    <div class="card">
        <h3>État des Chambres</h3>
        <p>CH1: <span id="p1">--</span> pers | CH2: <span id="p2">--</span> pers</p>
    </div>

    <div id="callScreen">
        <div class="caller-id">
            <p>APPEL ENTRANT</p>
            <h2 class="pulse">ALERTE MAISON</h2>
            <p>Localisation : Salon</p>
        </div>
        
        <div style="display:flex; gap:60px;">
            <div style="text-align:center;">
                <button class="decline-btn" onclick="stopAlerte()"><span style="font-size:30px; transform: rotate(135deg);">📞</span></button>
                <p style="margin-top:10px; font-size:12px;">Refuser</p>
            </div>
            <div style="text-align:center;">
                <button class="accept-btn" onclick="stopAlerte()"><span style="font-size:30px;">📞</span></button>
                <p style="margin-top:10px; font-size:12px;">Accepter</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://maison-connecte-5be95-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("maison");

        let lastIntrusionTime = 0;
        let isAlerteActive = false;

        function parler(message) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(message);
            msg.lang = 'fr-FR';
            window.speechSynthesis.speak(msg);
        }

        function toggleSecurity() { 
            document.getElementById("statusMsg").innerText = "Audio débloqué ✅";
            db.child("status").once('value').then(s => db.child("status").update({ modeSecu: !s.val().modeSecu })); 
        }

        function stopAlerte() {
            isAlerteActive = false;
            document.getElementById("callScreen").style.display = "none";
            window.speechSynthesis.cancel();
        }

        db.on("value", (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            document.getElementById("p1").innerText = data.chambre1.pers;
            document.getElementById("p2").innerText = data.chambre2.pers;

            const isSecu = data.status.modeSecu;
            const hasIntrusion = (data.chambre1.pers + data.chambre2.pers) > 0;
            const btnSecu = document.getElementById("btnSecu");

            if (isSecu) {
                btnSecu.innerText = "SURVEILLANCE ACTIVÉE";
                btnSecu.classList.add("active");
                
                if (hasIntrusion && !isAlerteActive) {
                    isAlerteActive = true;
                    document.getElementById("callScreen").style.display = "flex";
                    parler("Attention. Une présence a été détectée. Veuillez vérifier votre domicile.");
                    // iOS ne permet pas la vibration via JS sans interaction continue, 
                    // mais la voix et l'écran suffisent pour la démo.
                }
            } else {
                btnSecu.innerText = "ACTIVER LA SURVEILLANCE";
                btnSecu.classList.remove("active");
                stopAlerte();
            }
        });

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
