<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Home Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/553/553376.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --red: #ff3b30; --green: #34c759; --gray: #8e8e93; --dark: #1c1c1e; --blue: #007aff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f2f2f7; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 500px; } /* Empêche l'étirement sur PC */
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 20px; color: #1c1c1e; }
        .card { background: white; border-radius: 18px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn { padding: 18px; border-radius: 14px; border: none; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-secu { background: #e5e5ea; color: #3a3a3c; }
        .btn-secu.active { background: var(--red); color: white; box-shadow: 0 5px 15px rgba(255, 59, 48, 0.3); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat { background: #f8f9fa; padding: 15px; border-radius: 15px; text-align: center; }
        .label { font-size: 12px; color: var(--gray); text-transform: uppercase; font-weight: 600; }
        .val { display: block; font-size: 24px; font-weight: 800; color: var(--blue); margin-top: 5px; }
        #callScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); color: white; z-index: 9999; flex-direction: column; align-items: center; justify-content: space-around; }
        .circle-btn { width: 80px; height: 80px; border-radius: 50%; border: none; color: white; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>🏠 Ma Maison</h1>
        <div class="card">
            <button id="btnSecu" class="btn btn-secu" onclick="toggleSecurity()">ACTIVER LA SURVEILLANCE</button>
            <p id="audioWarning" style="font-size: 11px; color: var(--gray); margin-top: 10px; text-align: center;">ℹ️ Touchez pour autoriser le son</p>
        </div>
        <div class="card">
            <h3 style="margin-top:0; font-size: 18px;">Données Capteurs</h3>
            <div class="grid">
                <div class="stat"><span class="label">Pers. CH1</span><span class="val" id="p1">--</span></div>
                <div class="stat"><span class="label">Pers. CH2</span><span class="val" id="p2">--</span></div>
                <div class="stat"><span class="label">Luminosité</span><span class="val"><span id="l1">--</span><small style="font-size:12px"> lx</small></span></div>
                <div class="stat"><span class="label">Énergie</span><span class="val"><span id="pow">--</span><small style="font-size:12px"> W</small></span></div>
            </div>
        </div>
    </div>
    <div id="callScreen">
        <div style="text-align:center;">
            <p style="color: var(--gray);">ALERTE SÉCURITÉ</p>
            <h1 style="color:white; font-size: 40px;">INTRUSION !</h1>
        </div>
        <div style="display:flex; gap:50px;">
            <button class="circle-btn" style="background:var(--red); transform:rotate(135deg);" onclick="stopAlerte()">📞</button>
            <button class="circle-btn" style="background:var(--green);" onclick="stopAlerte()">📞</button>
        </div>
    </div>

    <script>
        // Ta config Firebase ici (garde celle que tu avais)
        const firebaseConfig = { databaseURL: "https://maison-connecte-5be95-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("maison");

        let alerteEnCours = false;
        function parler(m){ window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(m); u.lang='fr-FR'; window.speechSynthesis.speak(u); }
        function toggleSecurity(){ db.child("status").once('value').then(s => { db.child("status").update({ modeSecu: !s.val().modeSecu }); }); }
        function stopAlerte(){ alerteEnCours=false; document.getElementById("callScreen").style.display="none"; window.speechSynthesis.cancel(); }

        db.on("value", (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            document.getElementById("p1").innerText = data.chambre1.pers;
            document.getElementById("p2").innerText = data.chambre2.pers;
            document.getElementById("l1").innerText = data.chambre1.lux;
            document.getElementById("pow").innerText = Math.abs(data.energie.puissance).toFixed(2);

            const isSecu = data.status.modeSecu;
            const btn = document.getElementById("btnSecu");
            if(isSecu){
                btn.innerText = "SURVEILLANCE ACTIVE"; btn.classList.add("active");
                if((data.chambre1.pers + data.chambre2.pers) > 0 && !alerteEnCours){
                    alerteEnCours = true; document.getElementById("callScreen").style.display="flex";
                    parler("Intrusion détectée !");
                }
            } else {
                btn.innerText = "ACTIVER LA SURVEILLANCE"; btn.classList.remove("active");
                stopAlerte();
            }
        });
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
