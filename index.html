<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home IUT</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #f0f0f5; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* BOUTONS DE TEST BIEN VISIBLES */
        .test-btn-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .t-btn { flex: 1; padding: 20px; border: none; border-radius: 10px; font-weight: bold; color: white; cursor: pointer; }
        .t-vibre { background: #5856d6; }
        .t-audio { background: #af52de; }
        
        /* RESTE DU DESIGN */
        .banner { background: #34c759; color: white; padding: 15px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box { background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .value { display: block; font-size: 1.2em; font-weight: bold; color: #007aff; }
        .btn-main { width: 100%; padding: 15px; margin-top: 10px; border-radius: 10px; border: none; font-weight: bold; color: white; }
    </style>
</head>
<body>

    <div class="test-btn-container">
        <button class="t-btn t-vibre" onclick="testerVibrer()">TEST VIBREUR</button>
        <button class="t-btn t-audio" onclick="testerAudio()">TEST AUDIO</button>
    </div>

    <div id="banner" class="banner">Système Connecté</div>

    <div class="card">
        <h3>🏠 Chambre 1</h3>
        <div class="grid">
            <div class="box">Temp <span class="value" id="t1">--</span></div>
            <div class="box">Hum <span class="value" id="h1">--</span></div>
            <div class="box">Lum <span class="value" id="l1">--</span></div>
            <div class="box">Pers <span class="value" id="p1">--</span></div>
        </div>
    </div>

    <div class="card">
        <h3>🏠 Chambre 2</h3>
        <div class="grid">
            <div class="box">Temp <span class="value" id="t2">--</span></div>
            <div class="box">Hum <span class="value" id="h2">--</span></div>
            <div class="box">Lum <span class="value" id="l2">--</span></div>
            <div class="box">Pers <span class="value" id="p2">--</span></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://maison-connecte-5be95-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("maison");

        // --- FONCTIONS DE TEST ---
        function testerVibrer() {
            console.log("Test Vibreur...");
            if (window.navigator.vibrate) {
                window.navigator.vibrate([500, 200, 500]);
            } else {
                alert("Vibration non supportée");
            }
        }

        function testerAudio() {
            console.log("Test Audio...");
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance("Test du haut-parleur réussi");
            u.lang = 'fr-FR';
            window.speechSynthesis.speak(u);
        }

        // --- LECTURE FIREBASE ---
        db.on("value", (s) => {
            const d = s.val();
            if (!d) return;
            document.getElementById("t1").innerText = d.chambre1.temp + "°C";
            document.getElementById("h1").innerText = d.chambre1.hum + "%";
            document.getElementById("l1").innerText = d.chambre1.lux + " lx";
            document.getElementById("p1").innerText = d.chambre1.pers;
            
            document.getElementById("t2").innerText = d.chambre2.temp + "°C";
            document.getElementById("h2").innerText = d.chambre2.hum + "%";
            document.getElementById("l2").innerText = d.chambre2.lux + " lx";
            document.getElementById("p2").innerText = d.chambre2.pers;
        });
    </script>
</body>
</html>
