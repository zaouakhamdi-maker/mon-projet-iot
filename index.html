<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Smart Home IUT</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --green: #2ecc71;
            --blue: #3498db;
            --yellow: #f1c40f;
            --orange: #e67e22;
            --text: #2d3436;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: var(--text);
            margin: 0; padding: 20px; text-align: center;
        }

        .status-bar {
            background: white; padding: 10px 25px; border-radius: 50px;
            display: inline-block; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            font-weight: bold; color: var(--green);
        }

        .container { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 20px; max-width: 1000px; margin: 0 auto; 
        }
        
        .card { 
            background: var(--card-bg); border-radius: 20px; padding: 20px; 
            width: 280px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 5px solid var(--blue);
        }

        .card-h1 { border-color: var(--green); }
        .card-nrj { border-color: var(--yellow); width: 100%; max-width: 600px; }
        .card-ctrl { border-color: var(--orange); width: 100%; max-width: 600px; }

        h3 { margin-top: 0; color: #636e72; font-size: 1em; text-transform: uppercase; }

        .data-box {
            background: #f8f9fa; margin: 8px 0; padding: 12px;
            border-radius: 12px; display: flex; justify-content: space-between; align-items: center;
        }

        .valeur { font-size: 1.2em; font-weight: bold; }

        /* Styles des Boutons */
        .btn {
            padding: 10px 20px; border-radius: 10px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-mode { background: var(--green); color: white; width: 120px; }
        .btn-led { background: white; border: 2px solid var(--blue); color: var(--blue); }
        .btn-led:active { transform: scale(0.95); }
        .btn-led:disabled { opacity: 0.3; cursor: not-allowed; }

        .danger { background: #ff7675 !important; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
    </style>
</head>
<body>

    <h1>🏠 Dashboard &Eacute;co-Maison</h1>
    <div class="status-bar" id="etat">Connexion...</div>

    <div class="container">
        <div class="card card-h1">
            <h3>Chambre 1</h3>
            <div class="data-box"><span>Temp&eacute;rature</span><span class="valeur"><span id="t1">--</span>°C</span></div>
            <div class="data-box"><span>Humidit&eacute;</span><span class="valeur"><span id="h1">--</span>%</span></div>
            <div class="data-box"><span>Luminosit&eacute;</span><span class="valeur"><span id="l1">--</span> lx</span></div>
            <div class="data-box"><span>Pr&eacute;sence</span><span class="valeur"><span id="p1">--</span> pers</span></div>
        </div>

        <div class="card">
            <h3>Chambre 2</h3>
            <div class="data-box"><span>Temp&eacute;rature</span><span class="valeur"><span id="t2">--</span>°C</span></div>
            <div class="data-box"><span>Humidit&eacute;</span><span class="valeur"><span id="h2">--</span>%</span></div>
            <div class="data-box"><span>Luminosit&eacute;</span><span class="valeur"><span id="l2">--</span> lx</span></div>
            <div class="data-box"><span>Pr&eacute;sence</span><span class="valeur"><span id="p2">--</span> pers</span></div>
        </div>

        <div class="card card-nrj">
            <h3>Consommation &Eacute;nerg&eacute;tique</h3>
            <div style="display: flex; gap: 15px;">
                <div class="data-box" id="box-pow" style="flex:1;"><span>Puissance</span><span class="valeur"><span id="pow">--</span> W</span></div>
                <div class="data-box" style="flex:1;"><span>Courant</span><span class="valeur"><span id="cur">--</span> mA</span></div>
            </div>
        </div>

        <div class="card card-ctrl">
            <h3>Contr&ocirc;le Manuel</h3>
            <div class="data-box">
                <span>Mode Syst&egrave;me :</span>
                <button id="btnMode" class="btn btn-mode" onclick="toggleMode()">AUTO</button>
            </div>
            <div id="ledControls" style="display: flex; justify-content: space-around; padding-top: 10px;">
                <div>
                    <p style="font-size: 0.8em;">CHAMBRE 1</p>
                    <button onclick="setLed('L1', true)" class="btn btn-led">ON</button>
                    <button onclick="setLed('L1', false)" class="btn btn-led">OFF</button>
                </div>
                <div>
                    <p style="font-size: 0.8em;">CHAMBRE 2</p>
                    <button onclick="setLed('L2', true)" class="btn btn-led">ON</button>
                    <button onclick="setLed('L2', false)" class="btn btn-led">OFF</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION FIREBASE
        const firebaseConfig = { databaseURL: "https://maison-connecte-5be95-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("maison");

        // FONCTION : CHANGER DE MODE
        function toggleMode() {
            const btn = document.getElementById("btnMode");
            const newMode = (btn.innerText === "AUTO"); 
            db.child("status").update({ modeManuel: newMode });
        }

        // FONCTION : ALLUMER/ETEINDRE LED
        function setLed(led, state) {
            db.child("status").update({ [led]: state });
        }

        // LECTURE EN TEMPS RÉEL
        db.on("value", (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Update Capteurs
            document.getElementById("t1").innerText = data.chambre1.temp;
            document.getElementById("h1").innerText = data.chambre1.hum;
            document.getElementById("l1").innerText = data.chambre1.lux;
            document.getElementById("p1").innerText = data.chambre1.pers;
            document.getElementById("t2").innerText = data.chambre2.temp;
            document.getElementById("h2").innerText = data.chambre2.hum;
            document.getElementById("l2").innerText = data.chambre2.lux;
            document.getElementById("p2").innerText = data.chambre2.pers;
            document.getElementById("pow").innerText = data.energie.puissance;
            document.getElementById("cur").innerText = data.energie.courant;

            // Alerte Energie
            if(data.energie.puissance > 5) document.getElementById("box-pow").classList.add("danger");
            else document.getElementById("box-pow").classList.remove("danger");

            // Update Boutons Mode
            const btnMode = document.getElementById("btnMode");
            const ledBtns = document.querySelectorAll(".btn-led");
            
            if(data.status.modeManuel) {
                btnMode.innerText = "MANUEL";
                btnMode.style.backgroundColor = "#e67e22";
                ledBtns.forEach(b => b.disabled = false);
            } else {
                btnMode.innerText = "AUTO";
                btnMode.style.backgroundColor = "#2ecc71";
                ledBtns.forEach(b => b.disabled = true);
            }

            document.getElementById("etat").innerText = "● SYSTÈME SYNCHRONISÉ";
        });
    </script>
</body>
</html>
