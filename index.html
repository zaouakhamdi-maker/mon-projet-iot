<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Home V16.5 - Puissance & Courant</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007aff">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --red: #ff3b30; --blue: #007aff; --green: #34c759; --orange: #ff9500; --bg: #f2f2f7; --dark: #1c1c1e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; user-select: none; }
        .debug-bar { background: #000; padding: 10px; display: flex; gap: 8px; position: sticky; top: 0; z-index: 1000; }
        .btn-test { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; font-size: 11px; cursor: pointer; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .banner { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; font-weight: bold; border-left: 8px solid var(--green); box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.3s; min-height: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid var(--blue); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .box { background: #f8f9fa; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #eee; }
        .label { font-size: 10px; color: #888; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .value { font-size: 1.2em; font-weight: bold; color: var(--blue); }
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; color: white; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        .btn-led { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid var(--blue); background: white; color: var(--blue); font-weight: bold; cursor: pointer; }
        .btn-led:disabled { opacity: 0.3; cursor: not-allowed; border-color: #ccc; color: #ccc; }
        .input-seuil { width: 45px; padding: 5px; text-align: center; border: 1px solid #ccc; border-radius: 5px; font-weight: bold; color: var(--orange); }
        .danger { color: var(--red) !important; animation: pulse 1s infinite; }
        .intrusion-on { background: var(--red) !important; color: white !important; border-left-color: white !important; animation: blink 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes blink { 0%, 100% { background: var(--red); } 50% { background: #b00000; } }
    </style>
</head>
<body>

    <div class="debug-bar">
        <button class="btn-test" style="background:var(--red)" onclick="testerVib()">VIBRER</button>
        <button class="btn-test" style="background:var(--blue)" id="btnAudio" onclick="activerSon()">SON: OFF</button>
        <button class="btn-test" style="background:var(--orange)" onclick="demanderPermission()">NOTIFS</button>
    </div>

    <div class="container">
        <div id="banner" class="banner">SYNCHRONISATION...</div>

        <div class="card" style="border-top-color: var(--orange)">
            <h3 style="margin:0; font-size: 14px; color: var(--orange)">⚙️ Paramètres d'Alerte</h3>
            <div class="grid">
                <div class="box"><span class="label">Temp Max</span><input type="number" id="setT" class="input-seuil"> °C</div>
                <div class="box"><span class="label">Hum Max</span><input type="number" id="setH" class="input-seuil"> %</div>
            </div>
            <button class="btn-main" style="background: var(--orange); padding:10px;" onclick="saveSeuils()">VALIDER LES SEUILS</button>
        </div>

        <div class="card" style="border-top-color: var(--dark)">
            <button id="btnMode" class="btn-main" onclick="toggleMode()">MODE : ...</button>
            <button id="btnSecu" class="btn-main" onclick="toggleSecu()">SÉCURITÉ : ...</button>
            
            <div class="grid">
                <div class="box" style="background:#1c1c1e; color:#34c759; border:none;">
                    <span class="label" style="color:#34c759">Puissance</span>
                    <span style="font-size:1.5em; font-weight:bold" id="puissance">0</span> W
                </div>
                <div class="box" style="background:#1c1c1e; color:#34c759; border:none;">
                    <span class="label" style="color:#34c759">Courant</span>
                    <span style="font-size:1.5em; font-weight:bold" id="courant">0</span> mA
                </div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin:0">🛏️ Chambre 1</h3>
            <div class="grid">
                <div class="box"><span class="label">Temp</span><span class="value" id="t1">--</span>°C</div>
                <div class="box"><span class="label">Hum</span><span class="value" id="h1">--</span>%</div>
                <div class="box"><span class="label">Lumière</span><span class="value" id="l1">--</span></div>
                <div class="box"><span class="label">Présence</span><span class="value" id="p1">--</span></div>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="setLed('L1', true)" class="btn-led c-btn">ON</button>
                <button onclick="setLed('L1', false)" class="btn-led c-btn">OFF</button>
            </div>
        </div>

        <div class="card">
            <h3 style="margin:0">🛌 Chambre 2</h3>
            <div class="grid">
                <div class="box"><span class="label">Temp</span><span class="value" id="t2">--</span>°C</div>
                <div class="box"><span class="label">Hum</span><span class="value" id="h2">--</span>%</div>
                <div class="box"><span class="label">Lumière</span><span class="value" id="l2">--</span></div>
                <div class="box"><span class="label">Présence</span><span class="value" id="p2">--</span></div>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="setLed('L2', true)" class="btn-led c-btn">ON</button>
                <button onclick="setLed('L2', false)" class="btn-led c-btn">OFF</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://maison-connecte-5be95-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("maison");

        let audioOK = false;
        let lastAlert = 0;

        function testerVib() { if(navigator.vibrate) navigator.vibrate([200, 100, 200]); }
        function activerSon() { 
            audioOK = true; 
            document.getElementById('btnAudio').style.background = "var(--green)"; 
            document.getElementById('btnAudio').innerText = "SON: ON";
            parler("Système audio activé");
        }
        function demanderPermission() { Notification.requestPermission(); }

        function parler(texte) {
            if(audioOK) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(texte);
                u.lang = 'fr-FR';
                window.speechSynthesis.speak(u);
            }
        }

        function saveSeuils() {
            const t = document.getElementById("setT").value;
            const h = document.getElementById("setH").value;
            db.child("seuils").update({ tempMax: t, humMax: h });
            alert("Seuils mis à jour !");
        }

        function toggleMode() { db.child("status").once('value', s => db.child("status").update({ modeManuel: !s.val().modeManuel })); }
        function toggleSecu() { db.child("status").once('value', s => db.child("status").update({ modeSecu: !s.val().modeSecu })); }
        function setLed(l, v) { db.child("status").update({ [l]: v }); }

        db.on("value", (snapshot) => {
            const d = snapshot.val();
            if(!d) return;

            // --- SEUILS ---
            const sTemp = d.seuils ? parseFloat(d.seuils.tempMax) : 30;
            const sHum = d.seuils ? parseFloat(d.seuils.humMax) : 70;
            document.getElementById("setT").value = sTemp;
            document.getElementById("setH").value = sHum;

            // --- ENERGIE (PUISSANCE ET COURANT) ---
            if(d.energie) {
                document.getElementById("puissance").innerText = d.energie.puissance || "0";
                document.getElementById("courant").innerText = d.energie.courant || "0";
            } else {
                // Fallback si l'Arduino envoie à la racine
                document.getElementById("puissance").innerText = d.puissance || "0";
                document.getElementById("courant").innerText = d.courant || "0";
            }

            // --- CHAMBRE 1 ---
            const vT1 = d.chambre1.temp, vH1 = d.chambre1.hum, vP1 = d.chambre1.pers;
            document.getElementById("t1").innerText = vT1;
            document.getElementById("h1").innerText = vH1;
            document.getElementById("l1").innerText = d.chambre1.lux;
            document.getElementById("p1").innerText = vP1;

            // --- CHAMBRE 2 ---
            const vT2 = d.chambre2.temp, vH2 = d.chambre2.hum, vP2 = d.chambre2.pers;
            document.getElementById("t2").innerText = vT2;
            document.getElementById("h2").innerText = vH2;
            document.getElementById("l2").innerText = d.chambre2.lux;
            document.getElementById("p2").innerText = vP2;

            // --- ALERTES VISUELLES ---
            document.getElementById("t1").className = vT1 > sTemp ? "value danger" : "value";
            document.getElementById("t2").className = vT2 > sTemp ? "value danger" : "value";

            const banner = document.getElementById("banner");
            const isSec = d.status.modeSecu;
            
            if (isSec && (vP1 > 0 || vP2 > 0)) {
                banner.className = "banner intrusion-on";
                banner.innerText = "🚨 INTRUSION DÉTECTÉE !";
                triggerAlerte("ALERTE SÉCURITÉ", "Mouvement détecté !");
            } else if (vT1 > sTemp || vT2 > sTemp || vH1 > sHum || vH2 > sHum) {
                banner.className = "banner";
                banner.style.background = "var(--orange)";
                banner.style.color = "white";
                banner.innerText = "⚠️ SEUIL DÉPASSÉ";
                triggerAlerte("ALERTE SEUIL", "Vérifiez la température.");
            } else {
                banner.innerText = isSec ? "🛡️ SURVEILLANCE ACTIVE" : "✅ SYSTÈME OK";
                banner.className = "banner";
                banner.style.background = "white";
                banner.style.color = "black";
            }

            // --- BOUTONS ---
            const isMan = d.status.modeManuel;
            document.getElementById("btnMode").innerText = isMan ? "MODE : MANUEL" : "MODE : AUTOMATIQUE";
            document.getElementById("btnMode").style.background = isMan ? "var(--orange)" : "var(--green)";
            document.getElementById("btnSecu").innerText = isSec ? "SÉCURITÉ : ACTIVÉE" : "SÉCURITÉ : OFF";
            document.getElementById("btnSecu").style.background = isSec ? "var(--red)" : "#8e8e93";
            document.querySelectorAll(".c-btn").forEach(b => b.disabled = !isMan);
        });

        function triggerAlerte(titre, corps) {
            const now = Date.now();
            if (now - lastAlert > 15000) {
                if (Notification.permission === 'granted') {
                    navigator.serviceWorker.ready.then(reg => {
                        reg.showNotification(titre, { body: corps });
                    });
                }
                parler(corps);
                lastAlert = now;
            }
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js?v=16.5'); }
    </script>
</body>
</html>
