<script>
    const firebaseConfig = { databaseURL: "https://maison-connecte-5be95-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("maison");

    let audioOK = false;
    let lastAlert = 0;
    // On stocke les seuils localement pour comparer instantanément
    let sTemp = 30, sHum = 70; 

    // --- FONCTIONS ACTIONS ---
    function testerVib() { if(navigator.vibrate) navigator.vibrate([200, 100, 200]); }
    function activerSon() { 
        audioOK = true; 
        document.getElementById('btnAudio').style.background = "var(--green)"; 
        document.getElementById('btnAudio').innerText = "SON: ON";
        parler("Système réactif activé");
    }
    function parler(t) {
        if(audioOK) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'fr-FR'; window.speechSynthesis.speak(u); }
    }
    function saveSeuils() {
        sTemp = parseFloat(document.getElementById("setT").value);
        sHum = parseFloat(document.getElementById("setH").value);
        db.child("seuils").update({ tempMax: sTemp, humMax: sHum });
    }
    function toggleMode() { db.child("status").once('value', s => db.child("status").update({ modeManuel: !s.val().modeManuel })); }
    function toggleSecu() { db.child("status").once('value', s => db.child("status").update({ modeSecu: !s.val().modeSecu })); }
    function setLed(l, v) { db.child("status").update({ [l]: v }); }

    // --- ÉCOUTEURS CIBLÉS (PLUS RAPIDE) ---

    // 1. Écoute des seuils (une seule fois ou au changement)
    db.child("seuils").on("value", s => {
        const val = s.val();
        if(val) {
            sTemp = parseFloat(val.tempMax);
            sHum = parseFloat(val.humMax);
            document.getElementById("setT").value = sTemp;
            document.getElementById("setH").value = sHum;
        }
    });

    // 2. Écoute de la Chambre 1 (Instantanné)
    db.child("chambre1").on("value", s => {
        const d = s.val();
        document.getElementById("t1").innerText = d.temp;
        document.getElementById("h1").innerText = d.hum;
        document.getElementById("l1").innerText = d.lux || d.Lux;
        document.getElementById("p1").innerText = d.pers;
        document.getElementById("t1").className = parseFloat(d.temp) > sTemp ? "value danger" : "value";
        checkAlertes();
    });

    // 3. Écoute de la Chambre 2 (Instantanné)
    db.child("chambre2").on("value", s => {
        const d = s.val();
        document.getElementById("t2").innerText = d.temp;
        document.getElementById("h2").innerText = d.hum;
        document.getElementById("l2").innerText = d.lux || d.Lux;
        document.getElementById("p2").innerText = d.pers;
        document.getElementById("t2").className = parseFloat(d.temp) > sTemp ? "value danger" : "value";
        checkAlertes();
    });

    // 4. Écoute du Statut (Modes et Conso)
    db.child("status").on("value", s => {
        const d = s.val();
        document.getElementById("conso").innerText = d.consommation || "0.00";
        const isMan = d.modeManuel;
        const isSec = d.modeSecu;
        document.getElementById("btnMode").innerText = isMan ? "MODE : MANUEL" : "MODE : AUTOMATIQUE";
        document.getElementById("btnMode").style.background = isMan ? "var(--orange)" : "var(--green)";
        document.getElementById("btnSecu").innerText = isSec ? "SÉCURITÉ : ACTIVÉE" : "SÉCURITÉ : OFF";
        document.getElementById("btnSecu").style.background = isSec ? "var(--red)" : "#8e8e93";
        document.querySelectorAll(".c-btn").forEach(b => b.disabled = !isMan);
        checkAlertes();
    });

    // --- LOGIQUE D'ALERTE OPTIMISÉE ---
    function checkAlertes() {
        db.once("value", (snap) => {
            const d = snap.val();
            const banner = document.getElementById("banner");
            const p1 = parseInt(d.chambre1.pers) || 0;
            const p2 = parseInt(d.chambre2.pers) || 0;
            const t1 = parseFloat(d.chambre1.temp), t2 = parseFloat(d.chambre2.temp);
            const h1 = parseFloat(d.chambre1.hum), h2 = parseFloat(d.chambre2.hum);

            if (d.status.modeSecu && (p1 > 0 || p2 > 0)) {
                banner.className = "banner intrusion-on";
                banner.innerText = "🚨 INTRUSION DÉTECTÉE !";
                triggerNotification("ALERTE SÉCURITÉ", "Mouvement détecté !");
            } else if (t1 > sTemp || t2 > sTemp || h1 > sHum || h2 > sHum) {
                banner.className = "banner";
                banner.style.background = "var(--orange)";
                banner.style.color = "white";
                banner.innerText = "⚠️ SEUIL DÉPASSÉ";
                triggerNotification("ALERTE SEUIL", "Vérifiez la température ou l'humidité");
            } else {
                banner.className = "banner";
                banner.style.background = "white";
                banner.style.color = "black";
                banner.innerText = d.status.modeSecu ? "🛡️ SURVEILLANCE ACTIVE" : "✅ SYSTÈME OK";
            }
        });
    }

    function triggerNotification(titre, corps) {
        if (Date.now() - lastAlert > 10000) {
            if (Notification.permission === 'granted') {
                navigator.serviceWorker.ready.then(r => r.showNotification(titre, { body: corps, tag: "alert" }));
            }
            parler(corps);
            lastAlert = Date.now();
        }
    }

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js?v=16.1'); }
</script>
