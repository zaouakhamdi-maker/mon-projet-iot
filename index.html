<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Home V14 - Seuils</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007aff">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --red: #ff3b30; --blue: #007aff; --green: #34c759; --orange: #ff9500; --bg: #f2f2f7; --dark: #1c1c1e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; user-select: none; }
        .debug-bar { background: #000; padding: 10px; display: flex; gap: 8px; position: sticky; top: 0; z-index: 1000; }
        .btn-test { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; font-size: 11px; cursor: pointer; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .banner { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; font-weight: bold; border-left: 8px solid var(--green); box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.3s; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid var(--blue); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .box { background: #f8f9fa; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #eee; }
        .label { font-size: 10px; color: #888; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .value { font-size: 1.2em; font-weight: bold; color: var(--blue); }
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; color: white; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        .input-seuil { width: 60px; padding: 5px; text-align: center; border: 1px solid #ccc; border-radius: 5px; font-weight: bold; color: var(--orange); }
        .danger { color: var(--red) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="debug-bar">
        <button class="btn-test" style="background:var(--red)" onclick="testerVib()">VIBRER</button>
        <button class="btn-test" style="background:var(--blue)" id="btnAudio" onclick="testerAudio()">SON: OFF</button>
        <button class="btn-test" style="background:var(--orange)" onclick="demanderPermission()">NOTIFS</button>
    </div>

    <div class="container">
        <div id="banner" class="banner">CHARGEMENT...</div>

        <div class="card" style="border-top-color: var(--orange)">
            <h3 style="margin:0; font-size: 16px;">⚙️ Seuils d'alerte</h3>
            <div class="grid">
                <div class="box">
                    <span class="label">Temp Max (°C)</span>
                    <input type="number" id="setT" class="input-seuil" value="30">
                </div>
                <div class="box">
                    <span class="label">Hum Max (%)</span>
                    <input type="number" id="setH" class="input-seuil" value="70">
                </div>
            </div>
            <button class="btn-main" style="background: var(--orange); height: 40px; padding: 0;" onclick="saveSeuils()">ENREGISTRER</button>
        </div>

        <div class="card" style="border-top-color: var(--dark)">
            <button id="btnMode" class="btn-main" onclick="toggleMode()">MODE : ...</button>
            <button id="btnSecu" class="btn-main" onclick="toggleSecu()">SÉCURITÉ : ...</button>
            <div style="text-align:center; background:#1c1c1e; color:#34c759; padding:10px; border-radius:10px;">
                <span class="label">Consommation</span>
                <span style="font-size:1.5em; font-weight:bold" id="conso">0.00</span> kWh
            </div>
        </div>

        <div class="card">
            <h3>🛏️ Chambre 1</h3>
            <div class="grid">
                <div class="box"><span class="label">Temp</span><span class="value" id="t1">--</span>°C</div>
                <div class="box"><span class="label">Hum</span><span class="value" id="h1">--</span>%</div>
            </div>
        </div>

        <div class="card">
            <h3>🛌 Chambre 2</h3>
            <div class="grid">
                <div class="box"><span class="label">Temp</span><span class="value" id="t2">--</span>°C</div>
                <div class="box"><span class="label">Hum</span><span class="value" id="h2">--</span>%</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://maison-connecte-5be95-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("maison");

        let audioUnlocked = false;
        let alertSent = false;

        function testerVib() { if(navigator.vibrate) navigator.vibrate([200, 100, 200]); }
        function testerAudio() { audioUnlocked = true; document.getElementById('btnAudio').style.background = "var(--green)"; document.getElementById('btnAudio').innerText = "SON: ON"; }
        function demanderPermission() { Notification.requestPermission(); }

        function saveSeuils() {
            const t = document.getElementById("setT").value;
            const h = document.getElementById("setH").value;
            db.child("seuils").update({ tempMax: t, humMax: h });
            alert("Seuils mis à jour !");
        }

        function toggleMode() { db.child("status").once('value', s => db.child("status").update({ modeManuel: !s.val().modeManuel })); }
        function toggleSecu() { db.child("status").once('value', s => db.child("status").update({ modeSecu: !s.val().modeSecu })); }

        db.on("value", (snapshot) => {
            const d = snapshot.val();
            if(!d) return;

            // Données réelles
            const temp1 = parseFloat(d.chambre1.temp);
            const hum1 = parseFloat(d.chambre1.hum);
            const sTemp = d.seuils ? d.seuils.tempMax : 30;
            const sHum = d.seuils ? d.seuils.humMax : 70;

            // Affichage
            document.getElementById("t1").innerText = temp1;
            document.getElementById("h1").innerText = hum1;
            document.getElementById("t2").innerText = d.chambre2.temp;
            document.getElementById("h2").innerText = d.chambre2.hum;
            document.getElementById("conso").innerText = d.status.consommation || "0.00";
            document.getElementById("setT").value = sTemp;
            document.getElementById("setH").value = sHum;

            // Couleurs Alerte
            document.getElementById("t1").className = temp1 > sTemp ? "value danger" : "value";
            document.getElementById("h1").className = hum1 > sHum ? "value danger" : "value";

            const banner = document.getElementById("banner");
            if (temp1 > sTemp || hum1 > sHum) {
                const msg = temp1 > sTemp ? "TROP CHAUD !" : "TROP HUMIDE !";
                banner.innerText = "⚠️ SEUIL DÉPASSÉ : " + msg;
                banner.style.background = "var(--orange)";
                banner.style.color = "white";

                if (!alertSent && Notification.permission === 'granted') {
                    navigator.serviceWorker.ready.then(reg => {
                        reg.showNotification("ALERTE SEUIL", { body: msg, icon: "https://cdn-icons-png.flaticon.com/512/553/553376.png", tag: "seuil" });
                    });
                    alertSent = true;
                    setTimeout(() => alertSent = false, 30000); 
                }
            } else {
                banner.innerText = "✅ CONDITIONS OK";
                banner.style.background = "white";
                banner.style.color = "black";
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js?v=14');
        }
    </script>
</body>
</html>
