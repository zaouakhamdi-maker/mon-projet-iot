<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Home V17.0 - Fix Affichage</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --red: #ff3b30; --blue: #007aff; --green: #34c759; --orange: #ff9500; --bg: #f2f2f7; --dark: #1c1c1e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .banner { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; font-weight: bold; border-left: 8px solid var(--green); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid var(--blue); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .box { background: #f8f9fa; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #eee; }
        .label { font-size: 10px; color: #888; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .value { font-size: 1.2em; font-weight: bold; color: var(--blue); }
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; color: white; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        .input-seuil { width: 50px; padding: 5px; text-align: center; border: 1px solid #ddd; border-radius: 5px; }
        .danger { color: var(--red) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="container">
        <div id="banner" class="banner">CONNEXION FIREBASE...</div>

        <div class="card" style="border-top-color: var(--orange)">
            <div class="grid">
                <div class="box"><span class="label">Temp Max</span><input type="number" id="setT" class="input-seuil"> °C</div>
                <div class="box"><span class="label">Hum Max</span><input type="number" id="setH" class="input-seuil"> %</div>
            </div>
            <button class="btn-main" style="background: var(--orange)" onclick="saveSeuils()">VALIDER</button>
        </div>

        <div class="card" style="border-top-color: var(--dark)">
            <div class="grid">
                <div class="box" style="background:#1c1c1e; color:#34c759;"><span class="label">Puissance</span><span id="puissance">0</span> W</div>
                <div class="box" style="background:#1c1c1e; color:#34c759;"><span class="label">Courant</span><span id="courant">0</span> mA</div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin:0">🛏️ Chambre 1 (Démo)</h3>
            <div class="grid">
                <div class="box"><span class="label">Temp</span><span class="value" id="t1">--</span>°C</div>
                <div class="box"><span class="label">Hum</span><span class="value" id="h1">--</span>%</div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin:0">🛌 Chambre 2</h3>
            <div class="grid">
                <div class="box"><span class="label">Temp</span><span class="value" id="t2">--</span>°C</div>
                <div class="box"><span class="label">Hum</span><span class="value" id="h2">--</span>%</div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const firebaseConfig = { databaseURL: "https://maison-connecte-5be95-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("maison");

        let initialLoad = false;

        function saveSeuils() {
            const t = document.getElementById("setT").value;
            const h = document.getElementById("setH").value;
            db.child("seuils").update({ tempMax: Number(t), humMax: Number(h) });
        }

        // LECTURE
        db.on("value", (snapshot) => {
            const d = snapshot.val();
            console.log("Données reçues :", d); // VERIFICATION DANS LA CONSOLE (F12)

            if(!d) {
                document.getElementById("banner").innerText = "⚠️ BASE VIDE OU ERREUR CHEMIN";
                return;
            }

            // Récupération sécurisée des données de la Chambre 2
            const c2 = d.chambre2 || {};
            const realT2 = Number(c2.temp) || 0;
            const realH2 = Number(c2.hum) || 0;

            // Simulation Chambre 1
            const simT1 = (realT2 + 1.1).toFixed(1);
            const simH1 = (realH2 - 2);

            // Mise à jour de l'affichage
            document.getElementById("t1").innerText = simT1;
            document.getElementById("h1").innerText = simH1;
            document.getElementById("t2").innerText = realT2;
            document.getElementById("h2").innerText = realH2;

            // Energie
            if(d.energie) {
                document.getElementById("puissance").innerText = d.energie.puissance || "0";
                document.getElementById("courant").innerText = d.energie.courant || "0";
            }

            // Seuils
            const sT = d.seuils ? d.seuils.tempMax : 30;
            const sH = d.seuils ? d.seuils.humMax : 70;
            
            if(!initialLoad && d.seuils) {
                document.getElementById("setT").value = sT;
                document.getElementById("setH").value = sH;
                initialLoad = true;
            }

            // Alertes visuelles
            document.getElementById("t1").className = simT1 > sT ? "value danger" : "value";
            document.getElementById("t2").className = realT2 > sT ? "value danger" : "value";

            document.getElementById("banner").innerText = "✅ SYSTÈME CONNECTÉ";
            document.getElementById("banner").style.background = "white";

        }, (error) => {
            console.error("Erreur Firebase :", error);
            document.getElementById("banner").innerText = "❌ ERREUR DE CONNEXION";
        });
    </script>
</body>
</html>
</body>
</html>
